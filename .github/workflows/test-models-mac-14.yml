name: update-ss3-test-models-mac
on: 
  push:

jobs:
  update-ss3-test-models-mac:
    runs-on: macos-14
    env:
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: true
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: setup R  
        uses: r-lib/actions/setup-r@v2
      
      - name: install remotes
        run: Rscript -e 'install.packages("remotes")'

      - name: install r4ss
        run: Rscript -e 'remotes::install_github("r4ss/r4ss", ref = "m2-chip-get-ss3-exe")'

      - name: install other r packages
        run: Rscript -e 'install.packages(c("purrr","furrr","parallely","future"))'
      
      - name: get ss3 exe for m2 chip
        run: |
          get_ss3_exe()
        shell: Rscript {0}

